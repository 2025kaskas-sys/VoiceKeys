name: VoiceKeys
options:
  bundleIdPrefix: com.domingo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  VoiceKeys:
    type: application
    platform: iOS
    sources:
      - VoiceKeysApp
      - Shared
      - Resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      base:
        INFOPLIST_FILE: VoiceKeysApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.domingo.voicekeys
        CODE_SIGN_ENTITLEMENTS: VoiceKeysApp/VoiceKeys.entitlements
        DEVELOPMENT_TEAM: "M9U3NAX5D5"
        CODE_SIGN_STYLE: Automatic
    info:
      path: VoiceKeysApp/Info.plist
      properties:
        CFBundleDisplayName: VoiceKeys
        CFBundleName: VoiceKeys
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - voicekeys
            CFBundleURLName: com.domingo.voicekeys
        NSMicrophoneUsageDescription: "VoiceKeys 需要麦克风权限来录制语音"
        NSSpeechRecognitionUsageDescription: "VoiceKeys 需要语音识别权限来将语音转为文字"
        UIBackgroundModes:
          - audio
    dependencies:
      - target: VoiceKeysKeyboard
        embed: true
    entitlements:
      path: VoiceKeysApp/VoiceKeys.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.domingo.voicekeys

  VoiceKeysKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - VoiceKeysKeyboard
      - Shared
    settings:
      base:
        INFOPLIST_FILE: VoiceKeysKeyboard/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.domingo.voicekeys.keyboard
        CODE_SIGN_ENTITLEMENTS: VoiceKeysKeyboard/VoiceKeysKeyboard.entitlements
        DEVELOPMENT_TEAM: "M9U3NAX5D5"
        CODE_SIGN_STYLE: Automatic
    info:
      path: VoiceKeysKeyboard/Info.plist
      properties:
        CFBundleDisplayName: VoiceKeys
        CFBundleName: VoiceKeysKeyboard
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: "zh-Hans"
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).KeyboardViewController"
    entitlements:
      path: VoiceKeysKeyboard/VoiceKeysKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.domingo.voicekeys
